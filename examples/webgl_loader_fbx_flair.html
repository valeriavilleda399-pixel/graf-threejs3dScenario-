<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Three.js - FBX Final Corregido</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
        <link type="text/css" rel="stylesheet" href="main.css">
    </head>

    <body>
        <div id="info">
            Three.js - FBX con Texturas y HDR<br />

        </div>

        <script type="importmap">
            {
                "imports": {
                    "three": "../build/three.module.js",
                    "three/addons/": "./jsm/"
                }
            }
        </script>

        <script type="module">
            import * as THREE from 'three';
            import Stats from 'three/addons/libs/stats.module.js';
            import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
            import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';
            import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
            import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

            let camera, scene, renderer, stats, object, loader, guiMorphsFolder;
            let mixer, sound; // Declaradas aquí para que sean globales en el script
            const clock = new THREE.Clock();

            const params = { asset: 'Samba Dancing' };
            const assets = ['Samba Dancing', 'morph_test'];

            const textureLoader = new THREE.TextureLoader();
            const texturaModelo = textureLoader.load('models/textures/estrellas.jpg');
            texturaModelo.colorSpace = THREE.SRGBColorSpace;

            const texturaPiso = textureLoader.load('models/textures/piso3.jpg');
            texturaPiso.wrapS = texturaPiso.wrapT = THREE.RepeatWrapping;
            texturaPiso.repeat.set(10, 10);

            init();

            function init() {
                const container = document.createElement('div');
                document.body.appendChild(container);

                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
                camera.position.set(100, 200, 300);

                scene = new THREE.Scene();

                // Luces
                const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 3);
                scene.add(hemiLight);

                const dirLight = new THREE.DirectionalLight(0xffffff, 3);
                dirLight.position.set(0, 200, 100);
                dirLight.castShadow = true;
                scene.add(dirLight);

                // Piso
                const ground = new THREE.Mesh(
                    new THREE.PlaneGeometry(2000, 2000), 
                    new THREE.MeshStandardMaterial({ map: texturaPiso, roughness: 0.8 })
                );
                ground.rotation.x = - Math.PI / 2;
                ground.receiveShadow = true;
                scene.add(ground);

                // Renderer
                renderer = new THREE.WebGLRenderer({ antialias: true });
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setAnimationLoop(animate);
                renderer.shadowMap.enabled = true;
                container.appendChild(renderer.domElement);

                new OrbitControls(camera, renderer.domElement).target.set(0, 100, 0);

                // HDR
                new RGBELoader().load('models/rgbe/rogland_clear_night_4k.hdr', function (texture) {
                    texture.mapping = THREE.EquirectangularReflectionMapping;
                    scene.background = texture;
                    scene.environment = texture;
                });

                // --- CONFIGURACIÓN DE AUDIO CORREGIDA ---
                const listener = new THREE.AudioListener();
                camera.add(listener);

                sound = new THREE.Audio(listener); // Usamos la variable global
                const audioLoader = new THREE.AudioLoader();
                audioLoader.load('models/rgbe/TheFatRat - Rise Up - TheFatRat (youtube).mp3', function (buffer) {
                    console.log("Audio cargado exitosamente");
                    sound.setBuffer(buffer);
                    sound.setLoop(true);
                    sound.setVolume(0.5);
                });

                // UNICO EVENTO PARA ACTIVAR AUDIO
                window.addEventListener('pointerdown', () => {
                    if (THREE.AudioContext.getContext().state === 'suspended') {
                        THREE.AudioContext.getContext().resume();
                    }
                    if (sound && sound.buffer && !sound.isPlaying) {
                        sound.play();
                        console.log("Reproduciendo música...");
                    }
                }, { once: false }); // Se deja en false por si el usuario pausa/reproduce manualmente después

                // Loader FBX
                loader = new FBXLoader();
                loadAsset(params.asset);

                stats = new Stats();
                container.appendChild(stats.dom);

                window.addEventListener('resize', onWindowResize);
            }

            function loadAsset(asset) {
                loader.load('models/fbx/' + asset + '.fbx', function (group) {
                    if (object) {
                        object.traverse(child => {
                            if (child.material) {
                                const materials = Array.isArray(child.material) ? child.material : [child.material];
                                materials.forEach(m => m.dispose());
                            }
                            if (child.geometry) child.geometry.dispose();
                        });
                        scene.remove(object);
                    }

                    object = group;
                    if (object.animations && object.animations.length) {
                        mixer = new THREE.AnimationMixer(object);
                        mixer.clipAction(object.animations[0]).play();
                    }

                    object.traverse(function (child) {
                        if (child.isMesh) {
                            child.material = new THREE.MeshStandardMaterial({
                                map: texturaModelo,
                                roughness: 0.5,
                                metalness: 0.2
                            });
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });
                    scene.add(object);
                });
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            function animate() {
                const delta = clock.getDelta();
                if (mixer) mixer.update(delta);
                renderer.render(scene, camera);
                stats.update();
            }
        </script>
    </body>
</html>
